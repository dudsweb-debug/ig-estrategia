const ALL_FIELDS = GROUPS.flatMap(g=>g.fields);

async function sbFetch(path,method,body,extra){
  const headers = {"apikey":SUPABASE_KEY,"Authorization":"Bearer "+SUPABASE_KEY,"Content-Type":"application/json","Prefer":"return=representation"};
  if(extra) Object.assign(headers,extra);
  const opts = {method:method||"GET",headers};
  if(body) opts.body = JSON.stringify(body);
  const res = await fetch(SUPABASE_URL+"/rest/v1/"+path,opts);
  const text = await res.text();
  if(!res.ok) throw new Error(text||"Erro "+res.status);
  return text ? JSON.parse(text) : null;
}

const DB = {
  getClients: ()=>sbFetch("clients?select=*&order=created_at.asc"),
  createClient: (name,niche)=>sbFetch("clients","POST",{name,niche}),
  deleteClient: (id)=>sbFetch("clients?id=eq."+id,"DELETE",null,{"Prefer":"return=minimal"}),
  getPeriods: (cid)=>sbFetch("periods?client_id=eq."+cid+"&select=*&order=periodo.asc"),
  createPeriod: (data)=>sbFetch("periods","POST",data),
  deletePeriod: (id)=>sbFetch("periods?id=eq."+id,"DELETE",null,{"Prefer":"return=minimal"}),
  getGoals: async(cid)=>{const r=await sbFetch("goals?client_id=eq."+cid+"&select=*");return r&&r[0]||null;},
  upsertGoals: (cid,data)=>sbFetch("goals","POST",Object.assign({client_id:cid,updated_at:new Date().toISOString()},data),{"Prefer":"return=representation,resolution=merge-duplicates"}),
};

function fmt(n){
  if(n===undefined||n===null||n==="") return "–";
  const num=Number(n); if(isNaN(num)) return "–";
  if(num>=1e6) return (num/1e6).toFixed(1)+"M";
  if(num>=1000) return (num/1000).toFixed(1)+"K";
  return num.toLocaleString("pt-BR");
}
function pct(a,b){
  if(!b||!a||Number(b)===0) return null;
  return (((Number(a)-Number(b))/Number(b))*100).toFixed(1);
}
function goalSt(a,g){
  if(!a||!g) return null;
  const r=Number(a)/Number(g);
  return r>=1?"achieved":r>=0.8?"near":"behind";
}

// ── UI primitives ──
function Btn(p){
  const bg=p.outline?"transparent":p.disabled?T.border:T.accentMid;
  const col=p.disabled?T.muted:p.outline?T.mutedLight:T.text;
  return h("button",{onClick:p.onClick,disabled:p.disabled,style:{background:bg,color:col,border:p.outline?"1px solid "+T.border:"none",borderRadius:10,padding:p.small?"7px 14px":"11px 22px",fontSize:p.small?13:14,fontWeight:600,whiteSpace:"nowrap",cursor:p.disabled?"not-allowed":"pointer"}},p.children);
}
function Fld(p){
  const s={width:"100%",background:T.surface,border:"1px solid "+T.border,borderRadius:10,color:T.text,padding:"10px 14px",fontSize:14,outline:"none",boxSizing:"border-box",fontFamily:"inherit",resize:p.multiline?"vertical":undefined};
  return h("div",{style:{marginBottom:12}},
    p.label&&h("label",{style:{fontSize:12,color:T.muted,display:"block",marginBottom:4}},p.label),
    p.multiline
      ? h("textarea",{value:p.value,onChange:e=>p.onChange(e.target.value),placeholder:p.placeholder,rows:3,style:s})
      : h("input",{type:p.number?"number":"text",value:p.value,onChange:e=>p.onChange(e.target.value),placeholder:p.placeholder,style:s})
  );
}
function Back(p){return h("button",{onClick:p.onClick,style:{background:"none",border:"none",color:T.muted,fontSize:13,padding:"0 0 20px",display:"block",cursor:"pointer"}},p.label||"← Voltar");}
function Empty(p){return h("div",{style:{border:"1.5px dashed "+T.border,borderRadius:16,padding:48,textAlign:"center"}},h("div",{style:{fontSize:32,marginBottom:12}},p.icon),h("div",{style:{color:T.mutedLight,fontSize:14,marginBottom:20}},p.text),p.children);}
function SecTitle(p){return h("div",{style:{display:"flex",alignItems:"center",gap:8,margin:"20px 0 10px",paddingBottom:8,borderBottom:"1px solid "+T.border}},h("span",{style:{fontSize:15}},p.icon),h("span",{style:{fontWeight:700,fontSize:13,color:T.mutedLight}},p.label));}
function Delta(p){
  const d=pct(p.curr,p.prev); if(d===null) return null;
  const up=Number(d)>=0;
  return h("span",{style:{fontSize:11,fontWeight:700,padding:"2px 7px",borderRadius:20,background:up?T.greenSoft:T.redSoft,color:up?T.green:T.red}},(up?"▲":"▼")+" "+Math.abs(d)+"%");
}
function Spark(p){
  if(!p.periods||p.periods.length<2) return null;
  const vals=p.periods.map(x=>Number(x[p.k])||0);
  const max=Math.max(...vals,1);
  return h("div",{style:{display:"flex",alignItems:"flex-end",gap:3,height:28}},
    vals.map((v,i)=>h("div",{key:i,style:{width:7,borderRadius:2,height:Math.max((v/max)*100,4)+"%",background:i===vals.length-1?T.accent:T.accentMid+"55"}}))
  );
}
function GoalBar(p){
  if(!p.goal) return null;
  const ratio=Math.min(Number(p.actual||0)/Number(p.goal),1);
  const st=goalSt(p.actual,p.goal);
  const col=st==="achieved"?T.green:st==="near"?T.yellow:T.accent;
  return h("div",{style:{marginTop:6}},
    h("div",{style:{display:"flex",justifyContent:"space-between",fontSize:10,color:T.muted,marginBottom:3}},
      h("span",null,"Meta: "+fmt(p.goal)),
      h("span",{style:{color:col}},st==="achieved"?"✓ Atingida":st==="near"?"⚡ Quase lá":Math.round(ratio*100)+"%")
    ),
    h("div",{style:{height:4,borderRadius:4,background:T.border}},
      h("div",{style:{height:"100%",width:(ratio*100)+"%",background:col,borderRadius:4,transition:"width .5s"}})
    )
  );
}

// ── App ──
function App(){
  const [view,setView]=useState("home");
  const [clients,setClients]=useState([]);
  const [client,setClient]=useState(null);
  const [periods,setPeriods]=useState([]);
  const [goals,setGoals]=useState(null);
  const [loading,setLoading]=useState(true);
  const [tab,setTab]=useState("overview");
  const [report,setReport]=useState("");
  const [repLoading,setRepLoading]=useState(false);
  const [canvaMsg,setCanvaMsg]=useState("");
  const [canvaLoad,setCanvaLoad]=useState(false);
  const [toast,setToast]=useState("");
  const [err,setErr]=useState("");

  function showToast(m){setToast(m);setTimeout(()=>setToast(""),3500);}
  function showErr(m){setErr(m);setTimeout(()=>setErr(""),6000);}

  useEffect(()=>{
    DB.getClients().then(c=>{setClients(c||[]);setLoading(false);}).catch(e=>{showErr(e.message);setLoading(false);});
  },[]);

  async function selClient(c){
    setClient(c);setLoading(true);
    try{const[p,g]=await Promise.all([DB.getPeriods(c.id),DB.getGoals(c.id)]);setPeriods(p||[]);setGoals(g);}
    catch(e){showErr(e.message);}
    setLoading(false);setView("client");setTab("overview");
  }
  async function createClient(name,niche){
    try{const rows=await DB.createClient(name,niche);const c=Array.isArray(rows)?rows[0]:rows;if(c){setClients(p=>[...p,c]);await selClient(c);}else showErr("Erro inesperado.");}
    catch(e){showErr("Erro: "+e.message);}
  }
  async function delClient(id){
    try{await DB.deleteClient(id);}catch(e){showErr(e.message);}
    setClients(p=>p.filter(c=>c.id!==id));
    if(client&&client.id===id){setClient(null);setView("home");}
  }
  async function addPeriod(data){
    try{const rows=await DB.createPeriod(Object.assign({},data,{client_id:client.id}));const p=Array.isArray(rows)?rows[0]:rows;if(p){setPeriods(prev=>[...prev,p].sort((a,b)=>a.periodo.localeCompare(b.periodo)));showToast("✓ Período salvo!");setView("client");}}
    catch(e){showErr("Erro: "+e.message);}
  }
  async function delPeriod(id){
    try{await DB.deletePeriod(id);}catch(e){showErr(e.message);}
    setPeriods(p=>p.filter(x=>x.id!==id));showToast("Período removido.");
  }
  async function saveGoals(data){
    try{const rows=await DB.upsertGoals(client.id,data);const g=Array.isArray(rows)?rows[0]:rows;setGoals(g);showToast("✓ Metas salvas!");setView("client");setTab("metas");}
    catch(e){showErr("Erro: "+e.message);}
  }

  async function genReport(){
    if(!periods.length) return;
    setRepLoading(true);setReport("");setView("report");
    const last=periods[periods.length-1];
    const prev=periods.length>1?periods[periods.length-2]:null;
    const line=p=>ALL_FIELDS.filter(f=>p[f.key]!=null&&p[f.key]!=="").map(f=>f.label+": "+p[f.key]).join(" | ");
    const goalLines=goals?ALL_FIELDS.filter(f=>goals[f.key]).map(f=>f.label+": meta "+goals[f.key]+", realizado "+(last[f.key]||"–")).join("\n"):"";
    const sys="Você é estrategista de Instagram para PMEs. Gere relatório em português com seções:\n[RESUMO] 2-3 frases\n[FUNCIONOU] 3 bullets\n[MELHORIA] 3 bullets\n[RECOMENDACOES] 3-5 ações concretas\n[CONTEUDO] Formatos e temas para o próximo período\n[METAS] Metas vs realizado\nMáximo 500 palavras. Seja direto.";
    const msg="Cliente: @"+client.name+(client.niche?" | "+client.niche:"")+"\nPeríodo: "+last.periodo+"\n"+line(last)+(last.observacoes?"\nContexto: "+last.observacoes:"")+(prev?"\n\nAnterior ("+prev.periodo+"): "+line(prev):"\nPrimeiro período.")+(goalLines?"\n\nMetas:\n"+goalLines:"");
    try{
      const res=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-6",max_tokens:1500,system:sys,messages:[{role:"user",content:msg}]})});
      const data=await res.json();
      setReport(data.content&&data.content[0]&&data.content[0].text||"Erro ao gerar.");
    }catch{setReport("Erro ao gerar relatório.");}
    setRepLoading(false);
  }

  async function exportCanva(){
    if(!report) return;
    setCanvaLoad(true);setCanvaMsg("Preparando...");
    const last=periods[periods.length-1];
    const prev=periods.length>1?periods[periods.length-2]:null;
    function ext(tag){const m=report.match(new RegExp("\\["+tag+"\\]([\\s\\S]*?)(?=\\[|$)"));return m?m[1].trim():"";}
    const top4=ALL_FIELDS.filter(f=>last[f.key]).slice(0,4).map(f=>{const d=pct(last[f.key],prev&&prev[f.key]);return f.label+": "+fmt(last[f.key])+(d?" ("+(Number(d)>=0?"+":"")+d+"%)":"");}).join("\n");
    const txt="RELATÓRIO @"+client.name+" — "+last.periodo+"\n\nNÚMEROS:\n"+top4+"\n\nRESUMO:\n"+ext("RESUMO")+"\n\nO QUE FUNCIONOU:\n"+ext("FUNCIONOU")+"\n\nRECOMENDAÇÕES:\n"+ext("RECOMENDACOES")+"\n\nCONTEÚDO:\n"+ext("CONTEUDO");
    try{await navigator.clipboard.writeText(txt);}catch{}
    setTimeout(()=>{window.open("https://www.canva.com/design/"+CANVA_ID+"/edit","_blank");setCanvaMsg("✓ Canva aberto! Conteúdo copiado.");setCanvaLoad(false);},600);
  }

  const hdr=h("div",{style:{borderBottom:"1px solid "+T.border,padding:"0 20px",position:"sticky",top:0,background:T.bg,zIndex:100}},
    h("div",{style:{maxWidth:960,margin:"0 auto",display:"flex",alignItems:"center",gap:12,height:52}},
      h("button",{onClick:()=>setView("home"),style:{background:"none",border:"none",cursor:"pointer",display:"flex",alignItems:"center",gap:4}},
        h("span",{style:{fontSize:18,fontWeight:800,color:T.accent,letterSpacing:-1}},"ig"),
        h("span",{style:{fontSize:13,color:T.mutedLight,fontWeight:500}},"estratégia")
      ),
      client&&view!=="home"&&h(Fragment,null,
        h("span",{style:{color:T.border}},"›"),
        h("button",{onClick:()=>setView("client"),style:{background:"none",border:"none",cursor:"pointer",color:T.mutedLight,fontSize:13}},"@"+client.name)
      ),
      view==="report"&&h(Fragment,null,h("span",{style:{color:T.border}},"›"),h("span",{style:{color:T.muted,fontSize:12}},"Relatório")),
      h("div",{style:{flex:1}}),
      view==="client"&&!loading&&h("div",{style:{display:"flex",gap:8}},
        h(Btn,{small:true,outline:true,onClick:()=>setView("goals")},"🎯 Metas"),
        h(Btn,{small:true,outline:true,onClick:()=>setView("addData")},"+ Período"),
        h(Btn,{small:true,onClick:genReport,disabled:!periods.length},"✦ Relatório")
      ),
      view==="report"&&report&&!repLoading&&h(Btn,{small:true,onClick:exportCanva,disabled:canvaLoad},"🎨 Canva")
    )
  );

  return h("div",{style:{background:T.bg,minHeight:"100vh",color:T.text}},
    toast&&h("div",{style:{position:"fixed",bottom:24,left:"50%",transform:"translateX(-50%)",background:T.green,color:"#000",padding:"10px 20px",borderRadius:12,fontWeight:600,fontSize:13,zIndex:999,whiteSpace:"nowrap"}},toast),
    err&&h("div",{style:{position:"fixed",bottom:24,left:"50%",transform:"translateX(-50%)",background:T.red,color:"#fff",padding:"10px 20px",borderRadius:12,fontWeight:600,fontSize:13,zIndex:999,maxWidth:"85vw",textAlign:"center"}},err),
    hdr,
    h("div",{style:{maxWidth:960,margin:"0 auto",padding:"28px 20px"}},
      loading&&view!=="report"
        ? h("div",{style:{display:"flex",justifyContent:"center",paddingTop:80}},h("div",{className:"spinner"}))
        : h(Fragment,null,
          view==="home"&&h(HomeView,{clients,onSelect:selClient,onNew:()=>setView("newClient"),onDelete:delClient}),
          view==="newClient"&&h(NewClientView,{onCreate:createClient,onBack:()=>setView("home")}),
          view==="client"&&client&&h(ClientView,{client,periods,goals,tab,setTab,onDeletePeriod:delPeriod,onAddData:()=>setView("addData"),onGoals:()=>setView("goals")}),
          view==="goals"&&client&&h(GoalsView,{client,goals,periods,onSave:saveGoals,onBack:()=>setView("client")}),
          view==="addData"&&client&&h(AddDataView,{client,onAdd:addPeriod,onBack:()=>setView("client")}),
          view==="report"&&h(ReportView,{report,loading:repLoading,client,periods,onBack:()=>setView("client"),onExport:exportCanva,canvaLoad,canvaMsg})
        )
    )
  );
}

function HomeView({clients,onSelect,onNew,onDelete}){
  return h("div",null,
    h("div",{style:{marginBottom:28}},
      h("div",{style:{fontSize:10,letterSpacing:3,color:T.accent,textTransform:"uppercase",marginBottom:8}},"Gestão de Contas"),
      h("h1",{style:{margin:0,fontSize:26,fontWeight:800}},"Seus clientes"),
      h("p",{style:{color:T.muted,marginTop:6,fontSize:14}},"Selecione para ver métricas, metas e relatórios.")
    ),
    clients.length===0
      ? h(Empty,{icon:"📱",text:"Nenhum cliente ainda."},h(Btn,{onClick:onNew},"+ Adicionar cliente"))
      : h("div",{style:{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(220px,1fr))",gap:14}},
          ...clients.map(c=>h("div",{key:c.id,onClick:()=>onSelect(c),
            style:{background:T.card,border:"1px solid "+T.border,borderRadius:14,padding:18,cursor:"pointer"},
            onMouseEnter:e=>e.currentTarget.style.borderColor=T.accentMid,
            onMouseLeave:e=>e.currentTarget.style.borderColor=T.border},
            h("div",{style:{display:"flex",justifyContent:"space-between"}},
              h("div",null,h("div",{style:{fontWeight:700,fontSize:15}},"@"+c.name),c.niche&&h("div",{style:{color:T.muted,fontSize:12,marginTop:2}},c.niche)),
              h("button",{onClick:e=>{e.stopPropagation();if(window.confirm("Remover @"+c.name+"?"))onDelete(c.id);},style:{background:"none",border:"none",color:T.muted,fontSize:18,padding:0,cursor:"pointer"}},"×")
            ),
            h("div",{style:{marginTop:14,color:T.accent,fontSize:12,fontWeight:600}},"Ver análise →")
          )),
          h("div",{onClick:onNew,
            style:{border:"1.5px dashed "+T.border,borderRadius:14,padding:18,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",color:T.muted,fontSize:14},
            onMouseEnter:e=>e.currentTarget.style.borderColor=T.accent,
            onMouseLeave:e=>e.currentTarget.style.borderColor=T.border},
            "+ Novo cliente"
          )
        )
  );
}

function NewClientView({onCreate,onBack}){
  const [name,setName]=useState("");
  const [niche,setNiche]=useState("");
  const [saving,setSaving]=useState(false);
  async function go(){if(!name.trim())return;setSaving(true);await onCreate(name.trim(),niche.trim());setSaving(false);}
  return h("div",{style:{maxWidth:460}},
    h(Back,{onClick:onBack}),
    h("h2",{style:{margin:"0 0 22px",fontWeight:800}},"Novo cliente"),
    h(Fld,{label:"Nome do perfil (sem @)",value:name,onChange:setName,placeholder:"ex: loja_doce_mania"}),
    h(Fld,{label:"Nicho / Segmento",value:niche,onChange:setNiche,placeholder:"ex: Confeitaria artesanal"}),
    h("div",{style:{marginTop:20,display:"flex",gap:10}},
      h(Btn,{onClick:go,disabled:!name.trim()||saving},saving?"Criando...":"Criar cliente"),
      h(Btn,{outline:true,onClick:onBack},"Cancelar")
    )
  );
}

function ClientView({client,periods,goals,tab,setTab,onDeletePeriod,onAddData,onGoals}){
  const last=periods[periods.length-1];
  const prev=periods.length>1?periods[periods.length-2]:null;
  const tabs=[["overview","Visão Geral"],["historico","Histórico"],["metas","Metas"]];

  if(!periods.length) return h("div",null,
    h("div",{style:{marginBottom:22}},
      h("div",{style:{fontSize:10,color:T.accent,letterSpacing:3,textTransform:"uppercase",marginBottom:4}},"Cliente"),
      h("h2",{style:{margin:0,fontWeight:800,fontSize:22}},"@"+client.name),
      client.niche&&h("div",{style:{color:T.muted,fontSize:13}},client.niche)
    ),
    h(Empty,{icon:"📊",text:"Nenhum período registrado ainda."},h(Btn,{onClick:onAddData},"+ Adicionar primeiro período"))
  );

  return h("div",null,
    h("div",{style:{marginBottom:22}},
      h("div",{style:{fontSize:10,color:T.accent,letterSpacing:3,textTransform:"uppercase",marginBottom:4}},"Cliente"),
      h("h2",{style:{margin:0,fontWeight:800,fontSize:22}},"@"+client.name),
      client.niche&&h("div",{style:{color:T.muted,fontSize:13}},client.niche)
    ),
    h("div",{style:{display:"flex",borderBottom:"1px solid "+T.border,marginBottom:22}},
      tabs.map(([k,l])=>h("button",{key:k,onClick:()=>setTab(k),style:{background:"none",border:"none",cursor:"pointer",padding:"10px 16px",fontSize:13,fontWeight:600,color:tab===k?T.accent:T.muted,borderBottom:"2px solid "+(tab===k?T.accent:"transparent"),marginBottom:-1}},l))
    ),
    tab==="overview"&&h("div",null,
      h("div",{style:{fontSize:12,color:T.muted,marginBottom:16}},"Último período: ",h("strong",{style:{color:T.mutedLight}},last.periodo),prev&&h(Fragment,null," · vs ",h("strong",{style:{color:T.mutedLight}},prev.periodo))),
      GROUPS.map(g=>{
        const has=g.fields.some(f=>last[f.key]!=null&&last[f.key]!=="");
        if(!has) return null;
        return h("div",{key:g.id},
          h(SecTitle,{icon:g.icon,label:g.label}),
          h("div",{style:{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(170px,1fr))",gap:10,marginBottom:8}},
            g.fields.filter(f=>last[f.key]!=null&&last[f.key]!=="").map(f=>
              h("div",{key:f.key,style:{background:T.card,border:"1px solid "+T.border,borderRadius:12,padding:14}},
                h("div",{style:{fontSize:11,color:T.muted,marginBottom:4}},f.icon+" "+f.label),
                h("div",{style:{fontWeight:800,fontSize:20,marginBottom:4}},fmt(last[f.key])),
                h("div",{style:{display:"flex",alignItems:"center",justifyContent:"space-between"}},
                  h(Delta,{curr:last[f.key],prev:prev&&prev[f.key]}),
                  h(Spark,{periods,k:f.key})
                ),
                h(GoalBar,{actual:last[f.key],goal:goals&&goals[f.key]})
              )
            )
          )
        );
      })
    ),
    tab==="historico"&&h("div",{style:{background:T.card,border:"1px solid "+T.border,borderRadius:14,overflow:"hidden"}},
      h("div",{style:{overflowX:"auto"}},
        h("table",{style:{width:"100%",borderCollapse:"collapse",fontSize:12}},
          h("thead",null,h("tr",{style:{borderBottom:"1px solid "+T.border}},
            h("th",{style:{padding:"10px 16px",textAlign:"left",color:T.muted,fontWeight:600,whiteSpace:"nowrap"}},"Período"),
            ALL_FIELDS.filter(f=>periods.some(p=>p[f.key]!=null&&p[f.key]!=="")).map(f=>
              h("th",{key:f.key,style:{padding:"8px 10px",textAlign:"right",color:T.muted,fontWeight:600,whiteSpace:"nowrap"}},f.label)
            ),
            h("th",null)
          )),
          h("tbody",null,
            [...periods].reverse().map((p,ri)=>{
              const i=periods.length-1-ri;const pv=i>0?periods[i-1]:null;
              return h("tr",{key:p.id,style:{borderBottom:"1px solid "+T.border+"22"}},
                h("td",{style:{padding:"10px 16px",fontWeight:600,whiteSpace:"nowrap"}},p.periodo),
                ALL_FIELDS.filter(f=>periods.some(x=>x[f.key]!=null&&x[f.key]!=="")).map(f=>
                  h("td",{key:f.key,style:{padding:"8px 10px",textAlign:"right",whiteSpace:"nowrap"}},
                    h("span",{style:{color:T.mutedLight}},fmt(p[f.key])),
                    pv&&p[f.key]&&h(Delta,{curr:p[f.key],prev:pv[f.key]})
                  )
                ),
                h("td",{style:{padding:"8px 12px"}},
                  h("button",{onClick:()=>{if(window.confirm("Remover?"))onDeletePeriod(p.id);},style:{background:"none",border:"none",cursor:"pointer",color:T.muted,fontSize:16}},"×")
                )
              );
            })
          )
        )
      )
    ),
    tab==="metas"&&(
      !goals||!Object.keys(goals).some(k=>!["id","client_id","updated_at"].includes(k)&&goals[k])
        ? h(Empty,{icon:"🎯",text:"Nenhuma meta definida ainda."},h(Btn,{onClick:onGoals},"Definir metas"))
        : h("div",null,
            h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}},
              h("div",{style:{fontSize:13,color:T.muted}},"Metas vs. "+last.periodo),
              h(Btn,{small:true,outline:true,onClick:onGoals},"Editar metas")
            ),
            GROUPS.map(g=>{
              const has=g.fields.some(f=>goals&&goals[f.key]);
              if(!has) return null;
              return h("div",{key:g.id},
                h(SecTitle,{icon:g.icon,label:g.label}),
                h("div",{style:{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(190px,1fr))",gap:10,marginBottom:8}},
                  g.fields.filter(f=>goals&&goals[f.key]).map(f=>{
                    const act=last&&last[f.key];const st=goalSt(act,goals[f.key]);
                    const col=st==="achieved"?T.green:st==="near"?T.yellow:T.accent;
                    const ratio=act&&goals[f.key]?Math.min(Number(act)/Number(goals[f.key]),1):0;
                    return h("div",{key:f.key,style:{background:T.card,border:"1px solid "+(st==="achieved"?T.green+"55":T.border),borderRadius:12,padding:14}},
                      h("div",{style:{fontSize:11,color:T.muted,marginBottom:8}},f.icon+" "+f.label),
                      h("div",{style:{display:"flex",justifyContent:"space-between",marginBottom:8}},
                        h("div",null,h("div",{style:{fontSize:18,fontWeight:800}},fmt(act)),h("div",{style:{fontSize:10,color:T.muted}},"realizado")),
                        h("div",{style:{textAlign:"right"}},h("div",{style:{fontSize:15,fontWeight:700,color:T.muted}},fmt(goals[f.key])),h("div",{style:{fontSize:10,color:T.muted}},"meta"))
                      ),
                      h("div",{style:{height:4,borderRadius:4,background:T.border,marginBottom:6}},h("div",{style:{height:"100%",width:(ratio*100)+"%",background:col,borderRadius:4}})),
                      h("div",{style:{fontSize:11,color:col,fontWeight:600}},st==="achieved"?"✓ Meta atingida!":st==="near"?"⚡ Quase lá":Math.round(ratio*100)+"% da meta")
                    );
                  })
                )
              );
            })
          )
    )
  );
}

function GoalsView({client,goals,periods,onSave,onBack}){
  const last=periods[periods.length-1];
  const [local,setLocal]=useState(()=>{const g={};ALL_FIELDS.forEach(f=>{g[f.key]=goals&&goals[f.key]!=null?goals[f.key]:""});return g;});
  const [saving,setSaving]=useState(false);
  async function go(){
    setSaving(true);
    const clean={};ALL_FIELDS.forEach(f=>{if(local[f.key]!==""&&local[f.key]!==null)clean[f.key]=local[f.key];});
    await onSave(clean);setSaving(false);
  }
  return h("div",{style:{maxWidth:700}},
    h(Back,{onClick:onBack}),
    h("h2",{style:{margin:"0 0 6px",fontWeight:800}},"🎯 Metas — @"+client.name),
    h("p",{style:{color:T.muted,fontSize:14,marginBottom:8}},"Defina as metas para acompanhar a evolução mês a mês."),
    GROUPS.map(g=>h("div",{key:g.id},
      h(SecTitle,{icon:g.icon,label:g.label}),
      h("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:8}},
        g.fields.map(f=>h("div",{key:f.key,style:{background:T.card,border:"1px solid "+T.border,borderRadius:10,padding:12}},
          h("div",{style:{fontSize:11,color:T.muted,marginBottom:4}},f.icon+" "+f.label),
          last&&last[f.key]!=null&&last[f.key]!==""&&h("div",{style:{fontSize:11,color:T.mutedLight,marginBottom:6}},"Atual: "+fmt(last[f.key])),
          h("input",{type:"number",value:local[f.key]||"",onChange:e=>setLocal(g=>Object.assign({},g,{[f.key]:e.target.value})),placeholder:"Definir meta",style:{width:"100%",background:T.surface,border:"1px solid "+T.border,borderRadius:8,color:T.text,padding:"8px 10px",fontSize:13,boxSizing:"border-box",outline:"none",fontFamily:"inherit"}})
        ))
      )
    )),
    h("div",{style:{marginTop:20,display:"flex",gap:10}},
      h(Btn,{onClick:go,disabled:saving},saving?"Salvando...":"Salvar metas"),
      h(Btn,{outline:true,onClick:onBack},"Cancelar")
    )
  );
}

function AddDataView({client,onAdd,onBack}){
  const [mode,setMode]=useState("choice");
  const [periodo,setPeriodo]=useState("");
  const [metrics,setMetrics]=useState({});
  const [obs,setObs]=useState("");
  const [saving,setSaving]=useState(false);
  const jsonRef=useRef();

  function setM(key,val){setMetrics(m=>Object.assign({},m,{[key]:val}));}

  function onJson(e){
    const file=e.target.files&&e.target.files[0];if(!file)return;
    const r=new FileReader();
    r.onload=ev=>{
      try{
        const d=JSON.parse(ev.target.result);
        if(d.periodo)setPeriodo(d.periodo);
        if(d.observacoes)setObs(d.observacoes);
        const rest=Object.assign({},d);delete rest.periodo;delete rest.observacoes;
        setMetrics(m=>Object.assign({},m,rest));
        setMode("manual");
      }catch{alert("JSON inválido.");}
    };
    r.readAsText(file);
  }

  async function save(){
    if(!periodo.trim()){alert("Informe o período (ex: Abr/2025).");return;}
    setSaving(true);
    await onAdd(Object.assign({periodo:periodo.trim(),observacoes:obs},metrics));
    setSaving(false);
  }

  if(mode==="choice") return h("div",{style:{maxWidth:480}},
    h(Back,{onClick:onBack}),
    h("h2",{style:{margin:"0 0 6px",fontWeight:800}},"Novo período"),
    h("p",{style:{color:T.muted,fontSize:14,marginBottom:24}},"@"+client.name+" — como inserir os dados?"),
    h("div",{style:{display:"grid",gap:12}},
      [
        {icon:"📋",title:"Importar JSON do Claude",desc:"Mande prints ao Claude aqui nesta conversa, receba o JSON e importe com 1 clique",m:"json",rec:true},
        {icon:"⌨️",title:"Inserir manualmente",desc:"Digite os números organizados por tipo de conteúdo",m:"manual",rec:false}
      ].map(o=>h("div",{key:o.m,
        onClick:()=>o.m==="json"?jsonRef.current.click():setMode(o.m),
        style:{background:T.card,border:"1.5px solid "+(o.rec?T.accentMid:T.border),borderRadius:14,padding:18,cursor:"pointer",position:"relative"},
        onMouseEnter:e=>e.currentTarget.style.borderColor=T.accent,
        onMouseLeave:e=>e.currentTarget.style.borderColor=o.rec?T.accentMid:T.border},
        o.rec&&h("div",{style:{position:"absolute",top:12,right:12,fontSize:11,color:T.accent,background:T.accentSoft,padding:"2px 8px",borderRadius:20,fontWeight:700}},"Recomendado"),
        h("div",{style:{fontSize:22,marginBottom:6}},o.icon),
        h("div",{style:{fontWeight:700,fontSize:14,marginBottom:3}},o.title),
        h("div",{style:{color:T.muted,fontSize:13}},o.desc)
      ))
    ),
    h("input",{ref:jsonRef,type:"file",accept:".json",style:{display:"none"},onChange:onJson})
  );

  return h("div",{style:{maxWidth:700}},
    h(Back,{onClick:()=>setMode("choice")}),
    h("h2",{style:{margin:"0 0 20px",fontWeight:800}},"Inserir dados — @"+client.name),
    h(Fld,{label:"Período *",value:periodo,onChange:setPeriodo,placeholder:"ex: Abr/2025"}),
    GROUPS.map(g=>h("div",{key:g.id},
      h(SecTitle,{icon:g.icon,label:g.label}),
      h("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:8}},
        g.fields.map(f=>h(Fld,{key:f.key,label:f.icon+" "+f.label,value:metrics[f.key]||"",onChange:v=>setM(f.key,v),placeholder:"–",number:true}))
      )
    )),
    h(Fld,{label:"Observações do período",value:obs,onChange:setObs,placeholder:"Campanha, feriado, lançamento...",multiline:true}),
    h("div",{style:{marginTop:18,display:"flex",gap:10}},
      h(Btn,{onClick:save,disabled:!periodo.trim()||saving},saving?"Salvando...":"Salvar período"),
      h(Btn,{outline:true,onClick:()=>setMode("choice")},"Voltar")
    )
  );
}

function ReportView({report,loading,client,periods,onBack,onExport,canvaLoad,canvaMsg}){
  const last=periods&&periods[periods.length-1];
  function ext(tag){if(!report)return "";const m=report.match(new RegExp("\\["+tag+"\\]([\\s\\S]*?)(?=\\[|$)"));return m?m[1].trim():"";}
  function renderText(text){
    return text.split("\n").map((line,i)=>{
      if(!line.trim()) return h("div",{key:i,style:{height:4}});
      const isBullet=line.match(/^[-•*]|^\d+\./);
      const content=isBullet?line.replace(/^[-•*]\s*/,"").replace(/^\d+\.\s*/,""):line;
      const html=content.replace(/\*\*(.*?)\*\*/g,'<strong style="color:'+T.mutedLight+'">$1</strong>');
      if(isBullet) return h("div",{key:i,style:{display:"flex",gap:10,marginBottom:7,fontSize:14,lineHeight:1.6}},
        h("span",{style:{color:T.accent,flexShrink:0}},"·"),
        h("span",{dangerouslySetInnerHTML:{__html:html}})
      );
      return h("p",{key:i,style:{fontSize:14,lineHeight:1.7,margin:"0 0 7px"},dangerouslySetInnerHTML:{__html:html}});
    });
  }
  const secs=[
    {tag:"RESUMO",title:"Resumo Executivo",icon:"📋"},
    {tag:"FUNCIONOU",title:"O que funcionou",icon:"✅"},
    {tag:"MELHORIA",title:"Pontos de melhoria",icon:"🔧"},
    {tag:"RECOMENDACOES",title:"Recomendações",icon:"🎯"},
    {tag:"CONTEUDO",title:"Direcionamento de Conteúdo",icon:"🎬"},
    {tag:"METAS",title:"Análise de Metas",icon:"🏁"},
  ];
  return h("div",{style:{maxWidth:700}},
    h(Back,{onClick:onBack,label:"← Voltar ao cliente"}),
    h("div",{style:{marginBottom:24}},
      h("h2",{style:{margin:0,fontWeight:800,fontSize:22}},"Relatório Estratégico"),
      h("div",{style:{color:T.muted,fontSize:13,marginTop:2}},"@"+(client&&client.name)+" · "+(last&&last.periodo))
    ),
    canvaMsg&&h("div",{style:{marginBottom:16,padding:"12px 16px",borderRadius:12,background:T.greenSoft,color:T.green,fontSize:13}},canvaMsg),
    loading
      ? h("div",{style:{background:T.card,border:"1px solid "+T.border,borderRadius:16,padding:60,display:"flex",flexDirection:"column",alignItems:"center",gap:14}},
          h("div",{className:"spinner"}),
          h("div",{style:{color:T.muted,fontSize:13}},"A IA está analisando os dados...")
        )
      : h("div",{style:{display:"grid",gap:14}},
          secs.map(s=>{const c=ext(s.tag);if(!c)return null;return h("div",{key:s.tag,style:{background:T.card,border:"1px solid "+T.border,borderRadius:14,padding:22}},
            h("div",{style:{display:"flex",alignItems:"center",gap:8,marginBottom:14}},h("span",null,s.icon),h("span",{style:{fontWeight:700,fontSize:14,color:T.mutedLight}},s.title)),
            renderText(c)
          );}),
          h("div",{style:{background:T.accentSoft,border:"1px solid "+T.accentMid+"44",borderRadius:14,padding:18,display:"flex",alignItems:"center",justifyContent:"space-between",gap:16}},
            h("div",null,
              h("div",{style:{fontWeight:700,fontSize:14,color:T.accent}},"🎨 Exportar para Canva"),
              h("div",{style:{color:T.muted,fontSize:13,marginTop:2}},"Abre o template com conteúdo pronto")
            ),
            h(Btn,{onClick:onExport,disabled:canvaLoad},canvaLoad?"Abrindo...":"Exportar →")
          )
        )
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(h(App));
</script>
