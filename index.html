async function sbFetch(path,method,body,extra){
  const headers = {"apikey":SUPABASE_KEY,"Authorization":"Bearer "+SUPABASE_KEY,"Content-Type":"application/json","Prefer":"return=representation"};
  if(extra) Object.assign(headers,extra);
  const opts = {method:method||"GET",headers};
  if(body) opts.body = JSON.stringify(body);
  const res = await fetch(SUPABASE_URL+"/rest/v1/"+path,opts);
  const text = await res.text();
  if(!res.ok) throw new Error(text||"Erro "+res.status);
  return text ? JSON.parse(text) : null;
}

function fmt(n){
  if(n===undefined||n===null||n==="") return "–";
  const num=Number(n); if(isNaN(num)) return "–";
  if(num>=1e6) return (num/1e6).toFixed(1)+"M";
  if(num>=1000) return (num/1000).toFixed(1)+"K";
  return num.toLocaleString("pt-BR");
}
function pct(a,b){
  if(!b||!a||Number(b)===0) return null;
  return (((Number(a)-Number(b))/Number(b))*100).toFixed(1);
}
function goalSt(a,g){
  if(!a||!g) return null;
  const r=Number(a)/Number(g);
  return r>=1?"achieved":r>=0.8?"near":"behind";
}

function Btn(p){
  const bg=p.outline?"transparent":p.disabled?T.border:T.accentMid;
  const col=p.disabled?T.muted:p.outline?T.mutedLight:T.text;
  return h("button",{onClick:p.onClick,disabled:p.disabled,style:{background:bg,color:col,border:p.outline?"1px solid "+T.border:"none",borderRadius:10,padding:p.small?"7px 14px":"11px 22px",fontSize:p.small?13:14,fontWeight:600,whiteSpace:"nowrap",cursor:p.disabled?"not-allowed":"pointer"}},p.children);
}
function Fld(p){
  const s={width:"100%",background:T.surface,border:"1px solid "+T.border,borderRadius:10,color:T.text,padding:"10px 14px",fontSize:14,outline:"none",boxSizing:"border-box",fontFamily:"inherit",resize:p.multiline?"vertical":undefined};
  return h("div",{style:{marginBottom:12}},
    p.label&&h("label",{style:{fontSize:12,color:T.muted,display:"block",marginBottom:4}},p.label),
    p.multiline
      ? h("textarea",{value:p.value,onChange:e=>p.onChange(e.target.value),placeholder:p.placeholder,rows:3,style:s})
      : h("input",{type:p.number?"number":"text",value:p.value,onChange:e=>p.onChange(e.target.value),placeholder:p.placeholder,style:s})
  );
}
function Back(p){return h("button",{onClick:p.onClick,style:{background:"none",border:"none",color:T.muted,fontSize:13,padding:"0 0 20px",display:"block",cursor:"pointer"}},p.label||"← Voltar");}
function Empty(p){return h("div",{style:{border:"1.5px dashed "+T.border,borderRadius:16,padding:48,textAlign:"center"}},h("div",{style:{fontSize:32,marginBottom:12}},p.icon),h("div",{style:{color:T.mutedLight,fontSize:14,marginBottom:20}},p.text),p.children);}
function SecTitle(p){return h("div",{style:{display:"flex",alignItems:"center",gap:8,margin:"20px 0 10px",paddingBottom:8,borderBottom:"1px solid "+T.border}},h("span",{style:{fontSize:15}},p.icon),h("span",{style:{fontWeight:700,fontSize:13,color:T.mutedLight}},p.label));}
function Delta(p){
  const d=pct(p.curr,p.prev); if(d===null) return null;
  const up=Number(d)>=0;
  return h("span",{style:{fontSize:11,fontWeight:700,padding:"2px 7px",borderRadius:20,background:up?T.greenSoft:T.redSoft,color:up?T.green:T.red}},(up?"▲":"▼")+" "+Math.abs(d)+"%");
}
function Spark(p){
  if(!p.periods||p.periods.length<2) return null;
  const vals=p.periods.map(x=>Number(x[p.k])||0);
  const max=Math.max(...vals,1);
  return h("div",{style:{display:"flex",alignItems:"flex-end",gap:3,height:28}},
    vals.map((v,i)=>h("div",{key:i,style:{width:7,borderRadius:2,height:Math.max((v/max)*100,4)+"%",background:i===vals.length-1?T.accent:T.accentMid+"55"}}))
  );
}
function GoalBar(p){
  if(!p.goal) return null;
  const ratio=Math.min(Number(p.actual||0)/Number(p.goal),1);
  const st=goalSt(p.actual,p.goal);
  const col=st==="achieved"?T.green:st==="near"?T.yellow:T.accent;
  return h("div",{style:{marginTop:6}},
    h("div",{style:{display:"flex",justifyContent:"space-between",fontSize:10,color:T.muted,marginBottom:3}},
      h("span",null,"Meta: "+fmt(p.goal)),
      h("span",{style:{color:col}},st==="achieved"?"✓ Atingida":st==="near"?"⚡ Quase lá":Math.round(ratio*100)+"%")
    ),
    h("div",{style:{height:4,borderRadius:4,background:T.border}},
      h("div",{style:{height:"100%",width:(ratio*100)+"%",background:col,borderRadius:4,transition:"width .5s"}})
    )
  );
}

  async function updateClient(id,data){
    try{const rows=await DB.updateClient(id,data);const c=Array.isArray(rows)?rows[0]:rows;if(c){setClients(p=>p.map(x=>x.id===id?c:x));setClient(c);showToast("✓ Cliente atualizado!");setView("client");}}

  async function delClient(id){

  async function genReport(){
    if(!periods.length) return;
    setRepLoading(true);setReport("");setView("report");
    const last=periods[periods.length-1];
    const prev=periods.length>1?periods[periods.length-2]:null;
    const line=p=>ALL_FIELDS.filter(f=>p[f.key]!=null&&p[f.key]!=="").map(f=>f.label+": "+p[f.key]).join(" | ");
    const goalLines=goals?ALL_FIELDS.filter(f=>goals[f.key]).map(f=>f.label+": meta "+goals[f.key]+", realizado "+(last[f.key]||"–")).join("\n"):"";
    const publicoInfo=[
      last.publico_genero_masc!=null?"Gênero: "+last.publico_genero_masc+"% masc / "+last.publico_genero_fem+"% fem":"",

    ].filter(Boolean).join(" | ");
    const sys="Você é estrategista de Instagram para PMEs. Gere relatório em português com seções:\n[RESUMO] 2-3 frases\n[FUNCIONOU] 3 bullets\n[MELHORIA] 3 bullets\n[RECOMENDACOES] 3-5 ações concretas\n[CONTEUDO] Formatos e temas para o próximo período\n[METAS] Metas vs realizado\nMáximo 500 palavras. Seja direto.";
    const msg="Cliente: @"+client.name+(client.niche?" | "+client.niche:"")+"\nPeríodo: "+last.periodo+"\n"+line(last)+(publicoInfo?"\nPúblico: "+publicoInfo:"")+(last.observacoes?"\nContexto: "+last.observacoes:"")+(prev?"\n\nAnterior ("+prev.periodo+"): "+line(prev):"\nPrimeiro período.")+(goalLines?"\n\nMetas:\n"+goalLines:"");
    try{
      const res=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-6",max_tokens:1500,system:sys,messages:[{role:"user",content:msg}]})});

      setReport(data.content&&data.content[0]&&data.content[0].text||"Erro ao gerar.");

  function genPdf(){
    if(!report||!periods.length) return;
    const last=periods[periods.length-1];
    const prev=periods.length>1?periods[periods.length-2]:null;
    function ext(tag){const m=report.match(new RegExp("\\["+tag+"\\]([\\s\\S]*?)(?=\\[|$)"));return m?m[1].trim():"";}
    function bullets(text){return text.split("\n").filter(l=>l.trim()).map(l=>{const ib=l.match(/^[-•*]|^\d+\./);const ct=ib?l.replace(/^[-•*]\s*/,"").replace(/^\d+\.\s*/,""):l;return ib?"<div style=\"display:flex;gap:10px;margin-bottom:8px;\"><span style=\"color:#94794A;font-weight:900;flex-shrink:0;\">·</span><span style=\"font-size:9pt;color:#4A2C18;line-height:1.55;\">"+ct+"</span></div>":"<p style=\"font-size:9pt;color:#4A2C18;line-height:1.6;margin-bottom:6px;\">"+ct+"</p>";}).join("");}
    function recs(text){return text.split("\n").filter(l=>l.trim()).map((l,i)=>{const ct=l.replace(/^[-•*]\s*/,"").replace(/^\d+\.\s*/,"");return "<div style=\"display:flex;gap:14px;padding:11px 14px;background:rgba(255,255,255,0.6);border:1px solid rgba(148,121,74,0.2);margin-bottom:7px;\"><span style=\"font-family:Arial Black,sans-serif;font-size:13pt;font-weight:900;color:#94794A;min-width:18px;line-height:1.2;\">"+(i+1)+"</span><span style=\"font-size:9pt;color:#4A2C18;line-height:1.55;\">"+ct+"</span></div>";}).join("");}
    function delta(curr,prv){const d=prv&&Number(prv)!==0?((Number(curr)-Number(prv))/Number(prv)*100).toFixed(1):null;if(!d)return "";const up=Number(d)>=0;return "<div style=\"font-size:7.5pt;font-weight:700;color:"+(up?"#4A7C59":"#8B3A3A")+";background:"+(up?"rgba(74,124,89,0.1)":"rgba(139,58,58,0.1)")+";padding:2px 8px;border-radius:20px;display:inline-block;margin-top:4px;\">"+(up?"▲":"▼")+" "+Math.abs(d)+"%</div>";}
    function bar(pct,color){color=color||"#94794A";return "<div style=\"height:5px;background:rgba(148,121,74,0.2);border-radius:3px;overflow:hidden;margin-top:5px;\"><div style=\"height:100%;width:"+Math.min(pct,100)+"%25;background:"+color+";border-radius:3px;\"></div></div>";}

    // Parse AI sections
    const resumo=ext("RESUMO");
    const funcionou=ext("FUNCIONOU");
    const melhoria=ext("MELHORIA");
    const recomendacoes=ext("RECOMENDACOES");
    const conteudo=ext("CONTEUDO");
    const metas=ext("METAS");

    // Calculated values
    const totalViz=(Number(last.posts_views||0)+Number(last.reels_views||0)+Number(last.stories_views||0));
    const pPosts=totalViz>0?((Number(last.posts_views||0)/totalViz)*100).toFixed(1):0;
    const pReels=totalViz>0?((Number(last.reels_views||0)/totalViz)*100).toFixed(1):0;
    const pStories=totalViz>0?((Number(last.stories_views||0)/totalViz)*100).toFixed(1):0;
    const totalEng=Number(last.posts_curtidas||0)+Number(last.reels_curtidas||0)+Number(last.posts_comentarios||0)+Number(last.reels_comentarios||0)+Number(last.posts_compartilhamentos||0)+Number(last.posts_salvamentos>0?last.posts_salvamentos:0);

    const S={
      bg:"#F5F0E8",offwhite:"#EDE8DF",cocoa:"#2B1D12",cocoaD:"#170D07",
      gold:"#94794A",goldOld:"#A98E55",brown:"#4A2C18",grey:"#8C7B6A",
      maroon:"#3A1014",maroonD:"#140506",tealD:"#182B35",
      div:"rgba(148,121,74,0.22)",
    };

    const slide=(bg,content,pageNum)=>"<div style=\"width:297mm;height:167mm;background:"+bg+";position:relative;overflow:hidden;page-break-after:always;display:flex;flex-direction:column;\">"+content+"<div style=\"position:absolute;bottom:14px;right:18px;font-size:7pt;color:"+S.grey+";font-family:Arial,sans-serif;letter-spacing:1px;\">"+pageNum+"</div></div>";
    const dark=(content,w)=>"<div style=\"background:"+S.cocoaD+";color:"+S.offwhite+";width:"+(w||"56mm")+";flex-shrink:0;padding:32px 26px;display:flex;flex-direction:column;justify-content:space-between;\">"+content+"</div>";
    const lbl=(t,light)=>"<div style=\"font-family:Arial,sans-serif;font-size:7pt;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:"+(light?S.goldOld:S.gold)+";margin-bottom:6px;\">"+t+"</div>";
    const disp=(t,size,col)=>"<div style=\"font-family:Arial Black,Arial,sans-serif;font-weight:900;text-transform:uppercase;line-height:0.95;font-size:"+(size||"20pt")+";color:"+(col||S.cocoaD)+";\">"+t+"</div>";
    const divider=(light)=>"<div style=\"height:1px;background:"+(light?"rgba(255,255,255,0.1)":S.div)+";margin:10px 0;\"></div>";
    const bigN=(val,lbl_,delta_)=>"<div><div style=\"font-size:7pt;font-family:Arial,sans-serif;letter-spacing:1.5px;text-transform:uppercase;color:"+S.grey+";margin-bottom:3px;\">"+lbl_+"</div><div style=\"font-family:Arial Black,sans-serif;font-weight:900;font-size:28pt;line-height:1;color:"+S.cocoaD+"\">"+fmt(val)+"</div>"+delta_+"</div>";

function AddDataView({client,onAdd,onBack}){
  const [mode,setMode]=useState("choice");
  const [periodo,setPeriodo]=useState("");
  const [metrics,setMetrics]=useState({});
  const [obs,setObs]=useState("");
  const [saving,setSaving]=useState(false);
  const jsonRef=useRef();

  function setM(key,val){setMetrics(m=>Object.assign({},m,{[key]:val}));}

  function onJson(e){
    const file=e.target.files&&e.target.files[0];if(!file)return;
    const r=new FileReader();
    r.onload=ev=>{
      try{
        const d=JSON.parse(ev.target.result);
        if(d.periodo)setPeriodo(d.periodo);
        if(d.observacoes)setObs(d.observacoes);
        const rest=Object.assign({},d);delete rest.periodo;delete rest.observacoes;
        setMetrics(m=>Object.assign({},m,rest));
        setMode("manual");
      }catch{alert("JSON inválido.");}
    };
    r.readAsText(file);
  }

  async function save(){
    if(!periodo.trim()){alert("Informe o período (ex: Abr/2025).");return;}
    setSaving(true);
    await onAdd(Object.assign({periodo:periodo.trim(),observacoes:obs},metrics));
    setSaving(false);
  }

  if(mode==="choice") return h("div",{style:{maxWidth:480}},
    h(Back,{onClick:onBack}),
    h("h2",{style:{margin:"0 0 6px",fontWeight:800}},"Novo período"),
    h("p",{style:{color:T.muted,fontSize:14,marginBottom:24}},"@"+client.name+" — como inserir os dados?"),
    h("div",{style:{display:"grid",gap:12}},
      [
        {icon:"📋",title:"Importar JSON do Claude",desc:"Mande prints ao Claude aqui nesta conversa, receba o JSON e importe com 1 clique",m:"json",rec:true},
        {icon:"⌨️",title:"Inserir manualmente",desc:"Digite os números organizados por tipo de conteúdo",m:"manual",rec:false}
      ].map(o=>h("div",{key:o.m,
        onClick:()=>o.m==="json"?jsonRef.current.click():setMode(o.m),
        style:{background:T.card,border:"1.5px solid "+(o.rec?T.accentMid:T.border),borderRadius:14,padding:18,cursor:"pointer",position:"relative"},
        onMouseEnter:e=>e.currentTarget.style.borderColor=T.accent,
        onMouseLeave:e=>e.currentTarget.style.borderColor=o.rec?T.accentMid:T.border},
        o.rec&&h("div",{style:{position:"absolute",top:12,right:12,fontSize:11,color:T.accent,background:T.accentSoft,padding:"2px 8px",borderRadius:20,fontWeight:700}},"Recomendado"),
        h("div",{style:{fontSize:22,marginBottom:6}},o.icon),
        h("div",{style:{fontWeight:700,fontSize:14,marginBottom:3}},o.title),
        h("div",{style:{color:T.muted,fontSize:13}},o.desc)
      ))
    ),
    h("input",{ref:jsonRef,type:"file",accept:".json",style:{display:"none"},onChange:onJson})
  );

  return h("div",{style:{maxWidth:700}},
    h(Back,{onClick:()=>setMode("choice")}),
    h("h2",{style:{margin:"0 0 20px",fontWeight:800}},"Inserir dados — @"+client.name),
    h(Fld,{label:"Período *",value:periodo,onChange:setPeriodo,placeholder:"ex: Abr/2025"}),
    GROUPS.map(g=>h("div",{key:g.id},
      h(SecTitle,{icon:g.icon,label:g.label}),
      h("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:8}},
        g.fields.map(f=>h(Fld,{key:f.key,label:f.icon+" "+f.label,value:metrics[f.key]||"",onChange:v=>setM(f.key,v),placeholder:"–",number:true}))
      )
    )),
    h(SecTitle,{icon:"👥",label:"Público"}),
    h("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:8}},
      PUBLICO_FIELDS.map(f=>h(Fld,{key:f.key,label:f.icon+" "+f.label,value:metrics[f.key]||"",onChange:v=>setM(f.key,v),placeholder:"–",number:f.type==="number"}))
    ),
    h(Fld,{label:"Observações do período",value:obs,onChange:setObs,placeholder:"Campanha, feriado, lançamento...",multiline:true}),
    h("div",{style:{marginTop:18,display:"flex",gap:10}},
      h(Btn,{onClick:save,disabled:!periodo.trim()||saving},saving?"Salvando...":"Salvar período"),
      h(Btn,{outline:true,onClick:()=>setMode("choice")},"Voltar")
    )
  );
}

function ReportView({report,loading,client,periods,goals,onBack,onExport,onPdf,canvaLoad,canvaMsg}){
  const last=periods&&periods[periods.length-1];
  function ext(tag){if(!report)return "";const m=report.match(new RegExp("\\["+tag+"\\]([\\s\\S]*?)(?=\\[|$)"));return m?m[1].trim():"";}
  function renderText(text){
    return text.split("\n").map((line,i)=>{
      if(!line.trim()) return h("div",{key:i,style:{height:4}});
      const isBullet=line.match(/^[-•*]|^\d+\./);
      const content=isBullet?line.replace(/^[-•*]\s*/,"").replace(/^\d+\.\s*/,""):line;
      const html=content.replace(/\*\*(.*?)\*\*/g,'<strong style="color:'+T.mutedLight+'">$1</strong>');
      if(isBullet) return h("div",{key:i,style:{display:"flex",gap:10,marginBottom:7,fontSize:14,lineHeight:1.6}},
        h("span",{style:{color:T.accent,flexShrink:0}},"·"),
        h("span",{dangerouslySetInnerHTML:{__html:html}})
      );
      return h("p",{key:i,style:{fontSize:14,lineHeight:1.7,margin:"0 0 7px"},dangerouslySetInnerHTML:{__html:html}});
    });
  }
  const secs=[
    {tag:"RESUMO",title:"Resumo Executivo",icon:"📋"},
    {tag:"FUNCIONOU",title:"O que funcionou",icon:"✅"},
    {tag:"MELHORIA",title:"Pontos de melhoria",icon:"🔧"},
    {tag:"RECOMENDACOES",title:"Recomendações",icon:"🎯"},
    {tag:"CONTEUDO",title:"Direcionamento de Conteúdo",icon:"🎬"},
    {tag:"METAS",title:"Análise de Metas",icon:"🏁"},
  ];
  return h("div",{style:{maxWidth:700}},
    h(Back,{onClick:onBack,label:"← Voltar ao cliente"}),
    h("div",{style:{marginBottom:24}},
      h("h2",{style:{margin:0,fontWeight:800,fontSize:22}},"Relatório Estratégico"),
      h("div",{style:{color:T.muted,fontSize:13,marginTop:2}},"@"+(client&&client.name)+" · "+(last&&last.periodo))
    ),
    canvaMsg&&h("div",{style:{marginBottom:16,padding:"12px 16px",borderRadius:12,background:T.greenSoft,color:T.green,fontSize:13}},canvaMsg),
    loading
      ? h("div",{style:{background:T.card,border:"1px solid "+T.border,borderRadius:16,padding:60,display:"flex",flexDirection:"column",alignItems:"center",gap:14}},
          h("div",{className:"spinner"}),
          h("div",{style:{color:T.muted,fontSize:13}},"A IA está analisando os dados...")
        )
      : h("div",{style:{display:"grid",gap:14}},
          secs.map(s=>{const c=ext(s.tag);if(!c)return null;return h("div",{key:s.tag,style:{background:T.card,border:"1px solid "+T.border,borderRadius:14,padding:22}},
            h("div",{style:{display:"flex",alignItems:"center",gap:8,marginBottom:14}},h("span",null,s.icon),h("span",{style:{fontWeight:700,fontSize:14,color:T.mutedLight}},s.title)),
            renderText(c)
          );}),
          h("div",{style:{background:T.accentSoft,border:"1px solid "+T.accentMid+"44",borderRadius:14,padding:18,display:"flex",alignItems:"center",justifyContent:"space-between",gap:16,flexWrap:"wrap"}},
            h("div",null,
              h("div",{style:{fontWeight:700,fontSize:14,color:T.accent}},"📄 Exportar Relatório"),
              h("div",{style:{color:T.muted,fontSize:13,marginTop:2}},"Gera PDF completo ou abre no Canva")
            ),
            h("div",{style:{display:"flex",gap:8}},
              h(Btn,{onClick:onPdf,small:true},"📄 Gerar PDF"),
              h(Btn,{onClick:onExport,disabled:canvaLoad,small:true,outline:true},canvaLoad?"Abrindo...":"🎨 Canva")
            )
          )
        )
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(h(App));
</script>
</body>
</html>
